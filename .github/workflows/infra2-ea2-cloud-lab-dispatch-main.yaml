# Disparador en main: delega en el workflow completo de INFRA2.
# Este workflow NO construye la infraestructura directamente.
# Su trabajo es llamar al workflow reutilizable que crea:
# VPC, 2 VMs Ubuntu con k3s, NLB, RDS primary, RDS replica, ECR y workloads.

name: INFRA2 - EA2 cloud lab (delegado EA2) (remoto)

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: Región AWS
        required: true
        type: string
        default: us-east-1
      instance_type:
        description: Tipo EC2 por nodo k3s
        required: true
        type: string
        default: t3.medium

jobs:
  delegar:
    uses: luciaV1982/AUY1104-SharedWorkflows/.github/workflows/infra2-ea2-provision-cloud-lab.yaml@main
    with:
      aws_region: ${{ inputs.aws_region }}
      instance_type: ${{ inputs.instance_type }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      EA2_SSH_PRIVATE_KEY: ${{ secrets.EA2_SSH_PRIVATE_KEY }}
